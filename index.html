<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevFlow - Advanced Developer Productivity Suite</title>
    <meta name="description" content="A premium, lightning-fast Developer Productivity Platform featuring interactive sprint Kanban boards, markdown notes, synchronized calendars, Pomodoro timers, and live GitHub logs." />
    <script>
      (function() {
        try {
          const pref = localStorage.getItem('theme-preference') || 'system';
          const isDark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
